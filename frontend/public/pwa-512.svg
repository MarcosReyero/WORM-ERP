<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Worm ERP">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity=".25" />
    </filter>
    <mask id="worm-mask">
      <circle
        cx="256"
        cy="256"
        r="150"
        fill="none"
        stroke="#fff"
        stroke-width="70"
        stroke-linecap="round"
      />
    </mask>
  </defs>

  <rect width="512" height="512" rx="128" fill="#fff" />

  <!-- Circular worm -->
  <circle
    cx="256"
    cy="256"
    r="150"
    fill="none"
    stroke="#0b0b0b"
    stroke-width="92"
    stroke-linecap="round"
    filter="url(#shadow)"
  />
  <circle
    cx="256"
    cy="256"
    r="150"
    fill="none"
    stroke="#1b1b1b"
    stroke-width="62"
    stroke-linecap="round"
    opacity=".92"
  />
  <circle
    cx="256"
    cy="256"
    r="150"
    fill="none"
    stroke="#050505"
    stroke-width="62"
    stroke-linecap="round"
    stroke-dasharray="120 9999"
    stroke-dashoffset="310"
    opacity=".9"
  />

  <!-- Segment cuts (show SVG white background) -->
  <g mask="url(#worm-mask)">
    <g stroke="#fff" stroke-width="18" stroke-linecap="round" opacity=".95">
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(10 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(28 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(46 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(64 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(82 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(100 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(118 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(136 256 256)" />
      <line x1="256" y1="24" x2="256" y2="488" transform="rotate(154 256 256)" />
    </g>
  </g>

  <!-- Eye -->
  <circle cx="292" cy="404" r="9" fill="#fff" opacity=".9" />
</svg>
