<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Worm ERP favicon">
  <!-- Circular worm mark (reads well at tiny sizes) -->
  <defs>
    <mask id="worm-mask">
      <circle
        cx="32"
        cy="32"
        r="20"
        fill="none"
        stroke="#fff"
        stroke-width="10"
        stroke-linecap="round"
      />
    </mask>
  </defs>

  <circle cx="32" cy="32" r="30" fill="#fff" />

  <!-- White outline first (for contrast on dark tab bars) -->
  <circle
    cx="32"
    cy="32"
    r="20"
    fill="none"
    stroke="#ffffff"
    stroke-width="10"
    stroke-linecap="round"
    opacity="0.96"
  />
  <circle
    cx="32"
    cy="32"
    r="20"
    fill="none"
    stroke="#0b0b0b"
    stroke-width="8"
    stroke-linecap="round"
  />
  <circle
    cx="32"
    cy="32"
    r="20"
    fill="none"
    stroke="#050505"
    stroke-width="8"
    stroke-linecap="round"
    stroke-dasharray="14 999"
    stroke-dashoffset="41"
    opacity=".9"
  />

  <!-- Segment cuts (show SVG white background) -->
  <g mask="url(#worm-mask)">
    <g stroke="#fff" stroke-width="2.2" stroke-linecap="round" opacity=".95">
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(16 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(36 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(56 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(76 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(96 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(116 32 32)" />
      <line x1="32" y1="4" x2="32" y2="60" transform="rotate(136 32 32)" />
    </g>
  </g>

  <!-- Eye -->
  <circle cx="38.5" cy="51" r="1.8" fill="#fff" opacity="0.9" />
</svg>
